services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-recensement} -d ${POSTGRES_DB:-recensement}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      # Exposé sur l'hôte uniquement pour pouvoir inspecter la base pendant
      # le développement (ex. avec un client PostgreSQL sur votre machine).
      # À retirer si vous ne voulez pas exposer PostgreSQL hors de Docker.
      - "5432:5432"

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Bind mount du code : les modifications faites sur votre machine
      # (via votre éditeur habituel) sont immédiatement prises en compte
      # dans le conteneur, sans reconstruire l'image à chaque changement.
      - .:/app
      - static_volume:/app/staticfiles
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  static_volume:
