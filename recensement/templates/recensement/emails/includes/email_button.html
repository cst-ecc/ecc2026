{% if action_url %}
<table role="presentation" cellspacing="0" cellpadding="0" style="margin:22px 0;">
  <tr>
    <td style="border-radius:12px; background:#0284c7;">
      <a href="{{ action_url }}" style="display:inline-block; padding:13px 18px; color:#ffffff; font-size:14px; font-weight:700; text-decoration:none;">
        {{ action_label|default:"Ouvrir la plateforme" }}
      </a>
    </td>
  </tr>
</table>
{% endif %}
