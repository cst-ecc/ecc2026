<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ email_title|default:"Plateforme ECC" }}</title>
</head>
<body style="margin:0; padding:0; background:#f1f5f9; color:#0f172a; font-family:Arial, Helvetica, sans-serif;">
  <div style="display:none; max-height:0; overflow:hidden; opacity:0; color:transparent;">
    {{ preheader|default:"Notification de la Plateforme ECC" }}
  </div>

  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f1f5f9; margin:0; padding:24px 12px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px; background:#ffffff; border-radius:18px; overflow:hidden; border:1px solid #e2e8f0;">
          {% include "recensement/emails/includes/email_header.html" %}

          <tr>
            <td style="padding:28px 28px 8px 28px;">
              {% block content %}{% endblock %}
            </td>
          </tr>

          {% include "recensement/emails/includes/email_footer.html" %}
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
