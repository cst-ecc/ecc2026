{% if request.user.is_authenticated %}
<a
  href="{% url 'recensement:notifications_liste' %}"
  class="relative inline-flex h-10 w-10 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-600 shadow-sm transition hover:border-brand-200 hover:bg-brand-50 hover:text-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-500"
  aria-label="Notifications{% if nb_notifications_non_lues %} : {{ nb_notifications_non_lues }} non lue{% if nb_notifications_non_lues > 1 %}s{% endif %}{% endif %}"
  title="Notifications"
>
  <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a3 3 0 0 1-5.714 0" />
  </svg>

  {% if nb_notifications_non_lues %}
    <span class="absolute -right-1 -top-1 inline-flex min-h-5 min-w-5 items-center justify-center rounded-full bg-red-600 px-1.5 text-[10px] font-bold leading-none text-white ring-2 ring-white">
      {% if nb_notifications_non_lues > 99 %}99+{% else %}{{ nb_notifications_non_lues }}{% endif %}
    </span>
  {% endif %}
</a>
{% endif %}
