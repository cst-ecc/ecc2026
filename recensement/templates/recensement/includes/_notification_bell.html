{# Cloche de notifications — nécessite les routes notifications_liste et notification_marquer_lue. #}
<a
  href="{% url 'recensement:notifications_liste' %}"
  class="relative inline-flex h-10 w-10 items-center justify-center rounded-full text-slate-600 hover:bg-slate-100 hover:text-slate-900"
  aria-label="Notifications"
>
  <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082A4.5 4.5 0 0 1 9.143 17.082M18 8a6 6 0 1 0-12 0c0 7-3 7-3 7h18s-3 0-3-7" />
  </svg>
  {% if nb_notifications_non_lues %}
    <span class="absolute -right-0.5 -top-0.5 inline-flex min-h-5 min-w-5 items-center justify-center rounded-full bg-red-600 px-1.5 text-[11px] font-bold text-white">
      {{ nb_notifications_non_lues }}
    </span>
  {% endif %}
</a>
