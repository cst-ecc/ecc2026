{% if messages %}
  <div class="mb-4 space-y-2" aria-live="polite">
    {% for message in messages %}
      <div class="app-alert {% if 'error' in message.tags %}app-alert--error{% elif 'success' in message.tags %}app-alert--success{% elif 'warning' in message.tags %}app-alert--warning{% else %}app-alert--info{% endif %}">
        {{ message }}
      </div>
    {% endfor %}
  </div>
{% endif %}
