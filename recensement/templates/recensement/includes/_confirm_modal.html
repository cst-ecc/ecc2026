{# Popup de confirmation réutilisable pour validations, suppressions, enregistrements et actions sensibles. #}
<div
  id="app-confirm-modal"
  class="fixed inset-0 z-[100] hidden"
  aria-hidden="true"
>
  <div class="absolute inset-0 bg-slate-950/55 backdrop-blur-sm" data-confirm-cancel></div>

  <div class="relative flex min-h-full items-center justify-center p-4">
    <div
      class="w-full max-w-md rounded-2xl bg-white shadow-2xl ring-1 ring-slate-900/10"
      role="dialog"
      aria-modal="true"
      aria-labelledby="app-confirm-title"
      aria-describedby="app-confirm-message"
    >
      <div class="flex items-start gap-3 border-b border-slate-100 px-5 py-4">
        <div
          id="app-confirm-icon"
          class="mt-0.5 flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-amber-50 text-amber-700"
          aria-hidden="true"
        >
          <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd" d="M8.485 2.495c.673-1.167 2.357-1.167 3.03 0l6.28 10.875c.673 1.167-.17 2.625-1.516 2.625H3.72c-1.347 0-2.19-1.458-1.516-2.625L8.485 2.495ZM10 6a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 6Zm0 8a1 1 0 1 0 0-2 1 1 0 0 0 0 2Z" clip-rule="evenodd" />
          </svg>
        </div>

        <div class="min-w-0">
          <h2 id="app-confirm-title" class="text-base font-semibold text-slate-900">
            Confirmer l’action
          </h2>
          <p id="app-confirm-message" class="mt-1 text-sm leading-6 text-slate-600">
            Voulez-vous continuer ?
          </p>
        </div>
      </div>

      <div id="app-confirm-details" class="hidden border-b border-slate-100 px-5 py-3 text-sm text-slate-500"></div>

      <div class="flex flex-col-reverse gap-2 px-5 py-4 sm:flex-row sm:justify-end">
        <button
          type="button"
          id="app-confirm-cancel"
          data-confirm-cancel
          class="inline-flex justify-center rounded-lg border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50"
        >
          Annuler
        </button>

        <button
          type="button"
          id="app-confirm-submit"
          class="inline-flex justify-center rounded-lg bg-brand-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-brand-700"
        >
          Confirmer
        </button>
      </div>
    </div>
  </div>
</div>
