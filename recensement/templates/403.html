{% extends "recensement/base.html" %}

{% block title %}Accès refusé{% endblock %}

{% block content %}
<div class="text-center py-16">
  <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-red-50 text-2xl mb-4">
    🚫
  </div>
  <h1 class="text-2xl font-semibold text-slate-900">Accès refusé</h1>
  <p class="mt-2 text-slate-500 max-w-md mx-auto">
    Votre compte n'a pas les droits nécessaires pour accéder à cette page.
    {% if exception %}<br class="hidden sm:block">{{ exception }}{% endif %}
  </p>
  <a href="{% url 'recensement:fiche_list' %}"
     class="inline-block mt-6 bg-brand-600 hover:bg-brand-700 text-white font-medium px-5 py-2.5 rounded-lg transition-colors">
    Retour à mes fiches
  </a>
</div>
{% endblock %}
