events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    server_tokens off;

    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=connection_limit:10m;

    upstream portal {
        server ecc-portal:8000;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        access_log off;
        return 444;
    }

    server {
        listen 443 ssl default_server;
        listen [::]:443 ssl default_server;

        server_name _;

        ssl_certificate /etc/letsencrypt/live/recensement-paroisses.ecc.bj/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/recensement-paroisses.ecc.bj/privkey.pem;

        access_log off;
        return 444;
    }

    server {
        listen 80;
        listen [::]:80;

        server_name recensement-paroisses.ecc.bj;

        location ^~ /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
            try_files $uri =404;
        }

        location / {
            return 301 https://recensement-paroisses.ecc.bj$request_uri;
        }
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;

        server_name recensement-paroisses.ecc.bj;

        ssl_certificate /etc/letsencrypt/live/recensement-paroisses.ecc.bj/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/recensement-paroisses.ecc.bj/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        client_max_body_size 20M;
        charset utf-8;
        server_tokens off;

        limit_conn connection_limit 20;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log warn;

        add_header Permissions-Policy "geolocation=(self), camera=(self)" always;

        location ~* \.php(?:/|$) {
            access_log off;
            log_not_found off;
            return 404;
        }

        location ~* ^/(?:wp-admin|wp-content|wp-includes)(?:/|$) {
            access_log off;
            log_not_found off;
            return 404;
        }

        location = /wp-login.php {
            access_log off;
            log_not_found off;
            return 404;
        }

        location = /xmlrpc.php {
            access_log off;
            log_not_found off;
            return 404;
        }

        location /static/ {
            alias /static/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        location /media/ {
            alias /media/;
            expires 7d;
            add_header Cache-Control "public";
        }

        location = /accounts/login/ {
            limit_req zone=login_limit burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://portal;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_redirect off;
        }

        location / {
            limit_req zone=general_limit burst=30 nodelay;
            limit_req_status 429;

            proxy_pass http://portal;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_redirect off;

            proxy_connect_timeout 30s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;
        }
    }
}
