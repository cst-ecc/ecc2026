services:
  personal:
    image: postgres:16.9-alpine
    container_name: ecc-personal
    restart: unless-stopped

    env_file:
      - .env.prod

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - personal_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

    security_opt:
      - no-new-privileges:true

    networks:
      - ecc_network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    stop_grace_period: 30s
    mem_limit: 512m
    cpus: "0.50"

  volume_init:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: ecc-portal:latest
    container_name: ecc-volume-init

    user: root
    entrypoint: ["/bin/sh", "-c"]

    command:
      - |
        mkdir -p /app/media/paroisses /app/staticfiles
        chown -R eccparishatlast:eccparishatlast /app/media /app/staticfiles
        chmod -R u+rwX,g+rX,o-rwx /app/media
        chmod -R u+rwX,g+rX,o+rX /app/staticfiles

    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media

    security_opt:
      - no-new-privileges:true

    restart: "no"

  portal:
    build:
      context: .
      dockerfile: Dockerfile.prod
    image: ecc-portal:latest
    container_name: ecc-portal

    restart: unless-stopped

    env_file:
      - .env.prod

    depends_on:
      personal:
        condition: service_healthy
      volume_init:
        condition: service_completed_successfully

    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media

    expose:
      - "8000"

    security_opt:
      - no-new-privileges:true

    networks:
      - ecc_network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    mem_limit: 1g
    cpus: "1.0"

  shield:
    build:
      context: ./docker/nginx
    image: ecc-shield:latest
    container_name: ecc-shield

    restart: unless-stopped

    depends_on:
      - portal

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - static_data:/static:ro
      - media_data:/media:ro
      - certbot_webroot:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro

    security_opt:
      - no-new-privileges:true

    networks:
      - ecc_network

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

    mem_limit: 128m
    cpus: "0.25"

  certbot:
    image: certbot/certbot:latest
    container_name: ecc-certbot

    volumes:
      - certbot_webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt

    entrypoint: ["certbot"]

    networks:
      - ecc_network

    profiles:
      - certificates

volumes:
  personal_data:
  static_data:
  media_data:
  certbot_webroot:
  letsencrypt:

networks:
  ecc_network:
    driver: bridge

